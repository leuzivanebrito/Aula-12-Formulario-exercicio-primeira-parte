<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Carros Eletricos</h1> 
    <p>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iusu">Nome Completo: </label><br>
            <!-- 
            required - obrigatório; 
            minlength - Tamanho mínimo; 
            maxlength - Tamanho máximo;
            size - Tamanho da caixa;
            placeholder - dica de preenchimento;
            autocomplete off - Não completar o preenchimento;           
            -->
            <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" size="30" 
            placeholder="Digite seu nome Completo" autocomplete="username"><br>
            <!-- autocomplete de username -->
        

    
            <label for="iusu">Modelo de carro eletrico favorito: </label><br>
            
            <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" size="30" 
            placeholder="Ex: Tesla Model 3" autocomplete="username"><br>
           
        
       
        
            <label for="isen">Crie uma senha de acesso: </label><br>
            <input type="password" name="sen" id="isen" required minlength="6" maxlength="20" size="15" placeholder="Mínimo 6 caracteres" autocomplete="current-password">
            
        
        <br><br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>


</body>
</html>
